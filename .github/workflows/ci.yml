name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify checked-in application fixtures
        run: |
          test -s artifacts/bvar_forecast.pkl
          test -s artifacts/bvar_forecast.pkl.sha256
          test -s artifacts/metadata.json
          test -s data/fred_panel.csv
          test -s www/vendor/echarts/echarts.min.js
          test -s www/vendor/echarts/LICENSE

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install locked dependencies
        run: uv sync --frozen --python "${{ matrix.python-version }}"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest
